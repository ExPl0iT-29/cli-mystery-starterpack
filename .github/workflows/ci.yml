name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (editable)
        working-directory: cli_mystery_starter
        run: pip install -e .

      - name: Run unit tests
        working-directory: cli_mystery_starter
        run: python -m unittest discover -s tests -t . -v

      - name: Smoke-test scaffold + validate roundtrip
        working-directory: cli_mystery_starter
        shell: bash
        run: |
          set -e
          SMOKE="${RUNNER_TEMP:-/tmp}/smoke-case"
          rm -rf "$SMOKE" || true
          python -m cli_mystery_starter init "$SMOKE"
          python -c "from cli_mystery_starter.verifier import hash_answer; print(hash_answer('Maria Ortega'))" > "$SMOKE/encoded"
          python -m cli_mystery_starter validate "$SMOKE"
          python -m cli_mystery_starter check-answer "$SMOKE" 'Maria Ortega'
